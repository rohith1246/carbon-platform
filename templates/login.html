<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – CarbonWise</title>
  <meta name="description" content="Log in to your CarbonWise account to track and reduce your carbon footprint." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-body">

  <div class="auth-glow auth-glow-1"></div>
  <div class="auth-glow auth-glow-2"></div>

  <main class="auth-card glass">
    <div class="auth-header">
      <a href="{{ url_for('index') }}" class="auth-logo"><span role="img" aria-label="sprout">🌿</span> CarbonWise</a>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to continue your green journey.</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="auth-form" novalidate>
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          class="form-input"
          placeholder="your_username"
          required
          autocomplete="username"
          minlength="3"
          maxlength="30"
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          class="form-input"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button id="login-submit" type="submit" class="btn btn-primary btn-full">
        Log In
      </button>
    </form>

    <p class="auth-footer-text">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="link">Create one free</a>
    </p>
  </main>

</body>
</html>
